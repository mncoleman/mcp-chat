name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/mcp-chat
            git pull origin main
            source .env
            # Always regenerate nginx.conf from template with correct domain
            DOMAIN=$(echo $APP_URL | sed 's|https://||')
            sed "s/your-domain.com/$DOMAIN/g" nginx.conf.example > nginx.conf
            sudo docker build --no-cache \
              --build-arg VITE_GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID \
              --build-arg VITE_API_URL=$APP_URL \
              -t mcp-chat-app .
            sudo /usr/local/bin/docker-compose up -d app nginx
            sudo docker image prune -f
